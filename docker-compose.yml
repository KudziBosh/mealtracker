# Local development stack. Production compose lives separately (Phase 2).
#
# Bring up:   docker compose up -d
# Migrate:    docker compose run --rm web python manage.py migrate
# Superuser:  docker compose run --rm web python manage.py createsuperuser
# Tests:      docker compose run --rm web pytest
# Bot token:  set TELEGRAM_BOT_TOKEN in .env, then /start the bot to bind chat ID

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mealtracker}
      POSTGRES_USER: ${POSTGRES_USER:-mealtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-mealtracker}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      args:
        INSTALL_DEV: "1"
        # Match the host user so bind-mounted files Django creates
        # (migrations, __pycache__) stay owned by the developer.
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Host port is configurable so this stack can coexist with other Django
      # apps on the same server (Portainer holds 8000 here).
      - "${WEB_HOST_PORT:-8005}:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: .
      args:
        INSTALL_DEV: "1"
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A mealtracker worker --loglevel=info

  celery_beat:
    build:
      context: .
      args:
        INSTALL_DEV: "1"
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A mealtracker beat --loglevel=info

  telegram_bot:
    build:
      context: .
      args:
        INSTALL_DEV: "1"
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    restart: on-failure
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python manage.py run_bot

volumes:
  pgdata:
