{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mealtracker{% endblock %}</title>
    {# Tailwind via CDN is fine for the MVP. Swap to a built pipeline if/when this grows. #}
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'tracker:dashboard' %}" class="font-semibold tracking-tight">
                Mealtracker
            </a>
            <nav class="text-sm text-slate-600 flex gap-4">
                <a href="/admin/" class="hover:text-slate-900">Admin</a>
                {% if user.is_authenticated %}
                    <span class="text-slate-400">{{ user.username }}</span>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
